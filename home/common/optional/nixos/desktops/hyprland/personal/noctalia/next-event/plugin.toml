id           = "addg/next-event"
name         = "Next Event"
version      = "1.0.0"
min_noctalia = "5.0.0"
author       = "addg"
license      = "MIT"
icon         = "calendar-month"
description  = "Shows the next upcoming calendar event from Noctalia's event cache."
tags         = ["calendar", "bar"]

[[widget]]
id    = "agenda"
entry = "next-event.luau"

  [[widget.setting]]
  key     = "max_chars"
  type    = "int"
  label   = "Max title length"
  default = 22
  min     = 6
  max     = 60

  # Only surface an event once it starts within this window (0 = no limit; ongoing always shows).
  [[widget.setting]]
  key     = "lookahead_minutes"
  type    = "int"
  label   = "Show within (minutes, 0 = no limit)"
  default = 30
  min     = 0
  max     = 1440

  [[widget.setting]]
  key     = "refresh_seconds"
  type    = "int"
  label   = "Refresh interval (seconds)"
  default = 30
  min     = 5
  max     = 600
